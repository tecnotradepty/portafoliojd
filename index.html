<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disk Creativo | Unidad de Almacenamiento</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Permanent+Marker&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-cream: #F4F3EF;
            --brand-purple: #6B00FF;
            --brand-purple-dark: #4A00E0;
            --dark-slate: #110E17;
            --text-dark: #1A1A1A;
            
            --font-display: 'Anton', sans-serif;
            --font-creative: 'Permanent Marker', cursive;
            --font-body: 'Space Grotesk', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-cream);
            color: var(--text-dark);
            font-family: var(--font-body);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .noise-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.05;
            background-image: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 4vw;
            position: absolute;
            width: 100%;
            z-index: 100;
        }

        .nav-text {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-dark);
            font-family: var(--font-body);
        }

        /* --- BOTONES CON MASCARA DE SPLAT --- */
        .btn-splat {
            -webkit-mask-image: url('https://raw.githubusercontent.com/tecnotradepty/portafoliojd/f273c683885d568c0762953a8123a6f199580b0f/DIQC/splat_mask.svg');
            mask-image: url('https://raw.githubusercontent.com/tecnotradepty/portafoliojd/f273c683885d568c0762953a8123a6f199580b0f/DIQC/splat_mask.svg');
            -webkit-mask-size: cover;
            mask-size: cover;
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-position: center;
            mask-position: center;
            background-color: var(--brand-purple);
            color: #FFFFFF;
            font-family: var(--font-creative);
            text-align: center;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 1.5px;
            position: relative;
            z-index: 50;
            filter: drop-shadow(0px 10px 15px rgba(107, 0, 255, 0.4));
            border: none;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), background-color 0.4s;
        }

        .btn-splat:hover {
            transform: scale(1.08) rotate(2deg);
            background-color: var(--brand-purple-dark);
        }

        .hero-splat {
            font-size: 1.3rem;
            padding: 35px 55px;
        }

        /* --- HERO SECTION --- */
        .hero-section {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 18vh 2vw 5vh 2vw;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, rgba(107,0,255,0.06) 0%, transparent 65%);
        }

        .hero-sandwich {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .hero-giant-text {
            font-family: var(--font-display);
            font-size: clamp(6rem, 21vw, 19rem);
            line-height: 0.82;
            color: var(--brand-purple);
            text-align: center;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: -3px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .hero-giant-text div {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Utilidad de capas (Z-Index Sandwich) */
        .z-back { z-index: 1; position: relative; }
        .z-front { z-index: 12; position: relative; }
        
        /* --- ESTILO LIQUID GLASS (APPLE STYLE) CON IMAGENES DE FONDO --- */
        .liquid-glass-letter {
            display: inline-block;
            background-color: transparent;
            position: relative;
            color: transparent;
            z-index: 20;
            animation: breatheGlass 6s infinite ease-in-out;
        }

        /* Las imágenes de las letras de vidrio líquido (D-I-S-I-E-I) */
        /* Reemplaza estas URLs por tus propias imágenes de vidrio si las tienes */
        .lgl-d { background-image: url('https://raw.githubusercontent.com/tecnotradepty/portafoliojd/f273c683885d568c0762953a8123a6f199580b0f/DIQC/glass_d.png'); }
        .lgl-i-1 { background-image: url('https://raw.githubusercontent.com/tecnotradepty/portafoliojd/f273c683885d568c0762953a8123a6f199580b0f/DIQC/glass_i.png'); }
        .lgl-s { background-image: url('https://raw.githubusercontent.com/tecnotradepty/portafoliojd/f273c683885d568c0762953a8123a6f199580b0f/DIQC/glass_s.png'); }
        .lgl-e { background-image: url('https://raw.githubusercontent.com/tecnotradepty/portafoliojd/f273c683885d568c0762953a8123a6f199580b0f/DIQC/glass_e.png'); }
        .lgl-i-2 { background-image: url('https://raw.githubusercontent.com/tecnotradepty/portafoliojd/f273c683885d568c0762953a8123a6f199580b0f/DIQC/glass_i.png'); }

        .lgl-size {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: drop-shadow(3px 5px 8px rgba(107, 0, 255, 0.4));
        }

        /* --- EFECTO DE RAYO DE LUZ --- */
        .hero-light-ray {
            position: absolute;
            top: 50%; left: 0; width: 100vw; height: 100vh;
            transform: translate(0, -50%) rotate(-10deg);
            z-index: 5;
            background-image: url('https://raw.githubusercontent.com/tecnotradepty/portafoliojd/f273c683885d568c0762953a8123a6f199580b0f/DIQC/prismatic_light_ray.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            animation: panRay 10s infinite linear;
            pointer-events: none;
            opacity: 0.8;
            filter: blur(2px);
        }

        /* Solo se refrecta en las letras de vidrio */
        .liquid-glass-letter::after {
            content: '';
            position: absolute;
            top: -200%; left: -200%; width: 500%; height: 500%;
            background-image: inherit;
            background-size: inherit;
            background-position: inherit;
            background-repeat: inherit;
            -webkit-background-clip: padding-box;
            background-clip: padding-box;
            z-index: -1;
            filter: blur(8px) brightness(1.5);
            animation: panRefraction 10s infinite linear;
            opacity: 0.6;
        }

        @keyframes breatheGlass {
            0%, 100% { filter: drop-shadow(3px 5px 8px rgba(107, 0, 255, 0.4)); }
            50% { filter: drop-shadow(0px 0px 15px rgba(107, 0, 255, 0.6)) brightness(1.1); }
        }

        @keyframes panRay {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        @keyframes panRefraction {
            0% { transform: translate(-10%, -10%); }
            100% { transform: translate(10%, 10%); }
        }

        .giant-transparent-logo {
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: clamp(280px, 42vw, 580px);
            z-index: 10;
            animation: floatLogo 8s ease-in-out infinite;
            pointer-events: none;
            filter: drop-shadow(0px 25px 40px rgba(107, 0, 255, 0.25));
        }

        /* --- SECCIÓN DARK (EQUIPO) --- */
        .dark-intro-section {
            background-color: var(--dark-slate);
            padding: 8rem 4vw;
            color: var(--bg-cream);
            position: relative;
            z-index: 10;
        }

        /* --- PORTAFOLIO (API SHEETS) --- */
        .portfolio-section {
            background-color: var(--bg-cream);
            padding: 8rem 4vw;
            position: relative;
            z-index: 10;
        }

        .portfolio-massive-title {
            font-family: var(--font-display);
            font-size: clamp(4rem, 13vw, 13rem);
            line-height: 0.8;
            color: var(--text-dark);
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .portfolio-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 4rem;
            flex-wrap: wrap;
            gap: 2.5rem;
            border-bottom: 2px solid var(--brand-purple);
            padding-bottom: 2.5rem;
        }

        .category-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: transparent;
            color: var(--text-dark);
            border: 2px solid var(--text-dark);
            padding: 10px 26px;
            font-family: var(--font-body);
            font-size: 0.88rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--brand-purple);
            color: var(--bg-cream);
            border-color: var(--brand-purple);
        }

        .grid-portfolio {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
            gap: 3rem;
        }

        .marketplace-card {
            background-color: transparent;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .card-preview-thumb {
            width: 100%;
            height: 320px;
            background-color: #e5e3db;
            background-size: cover;
            background-position: center;
            margin-bottom: 1.5rem;
            border: 2px solid transparent;
            border-radius: 12px;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .marketplace-card:hover .card-preview-thumb {
            transform: translateY(-8px);
            border-color: var(--brand-purple);
        }

        .card-body-info h3 {
            font-family: var(--font-display);
            font-size: 2.7rem;
            color: var(--text-dark);
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        .card-badge {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--brand-purple);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            display: block;
        }

        .card-body-info p {
            font-size: 1rem;
            line-height: 1.5;
            color: #555;
            margin-bottom: 1.5rem;
        }

        .btn-visit-solution {
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--brand-purple);
            border-bottom: 2px solid var(--brand-purple);
            align-self: flex-start;
            padding-bottom: 2px;
            transition: all 0.3s;
        }

        .btn-visit-solution:hover {
            color: #FF003C;
            border-color: #FF003C;
        }

        .loading-skeleton {
            grid-column: 1 / -1;
            font-family: var(--font-display);
            font-size: 3.5rem;
            color: var(--brand-purple);
            text-align: left;
            padding: 4rem 0;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        footer {
            text-align: center;
            padding: 3.5rem;
            font-family: var(--font-body);
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            background-color: var(--dark-slate);
            color: var(--bg-cream);
        }

        @media (max-width: 900px) {
            nav { flex-direction: column; gap: 20px; }
            .giant-transparent-logo { width: 85vw; }
            .hero-giant-text { font-size: clamp(4rem, 15vw, 15rem); letter-spacing: -2px;}
            .btn-splat { font-size: 1.1rem; padding: 20px 35px; }
        }
    </style>
</head>
<body>

    <div class="noise-overlay"></div>

    <nav>
        <div class="nav-text">DISQ // CREATIVO</div>
        <a href="mailto:contacto@diskcreativo.com" class="btn-splat" style="font-size: 1.1rem; padding: 25px 45px;">¡CONTACTO!</a>
    </nav>

    <section class="hero-section" id="hero-container">
        
        <div class="hero-light-ray"></div>

        <div class="hero-sandwich">
            <h1 class="hero-giant-text">
                <div>
                    <span class="liquid-glass-letter lgl-d lgl-size">D</span>
                    <span class="liquid-glass-letter lgl-i-1 lgl-size">I</span>
                    <span class="liquid-glass-letter lgl-s lgl-size">S</span>
                    <span class="z-front">K</span>
                </div>
                <div>
                    <span class="z-front">C</span>
                    <span class="z-back">R</span>
                    <span class="liquid-glass-letter lgl-e lgl-size">E</span>
                    <span class="z-back">A</span>
                    <span class="z-back">T</span>
                    <span class="liquid-glass-letter lgl-i-2 lgl-size">I</span>
                    <span class="z-back">V</span>
                    <span class="z-back">O</span>
                </div>
            </h1>

            <img src="https://raw.githubusercontent.com/tecnotradepty/portafoliojd/d38841a6b06f2718f85aeebd38686d56fefc4f8f/DIQC/1784599241012.png" alt="Disk Creativo Logo" class="giant-transparent-logo" id="dynamic-logo">
        </div>

        <div class="btn-splat hero-splat" style="margin-top: 5rem; font-size: 1.4rem; padding: 30px 65px; z-index: 10;">
            DISQUE CREATIVOS, LO HACEMOS REAL
        </div>
    </section>

    <!-- Resto del contenido original (Dark section, Portfolio, etc.) queda intacto -->
    <!-- ... -->
</body>
</html>
