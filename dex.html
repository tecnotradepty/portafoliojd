<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Disk Creativo | Inicializar Proyecto</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        html { scroll-behavior: smooth; }

        html, body {
            overflow-x: hidden;
            width: 100%;
            min-height: 100vh;
            background-color: var(--dark-slate);
        }

        :root {
            --bg-cream: #EAE9E4;       
            --brand-purple: #6B00FF; 
            --dark-slate: #110E17;     
            --text-dark: #1A1A1A;
            --visor-bg: #050505;
            
            --font-display: 'Anton', sans-serif;
            --font-body: 'Space Grotesk', sans-serif;
            --font-tech: 'Share Tech Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            color: #F4F3EF;
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
        }

        /* --- EFECTO DE RUIDO --- */
        .noise-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 9999; opacity: 0.04;
            background-image: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
        }

        /* --- NAVBAR SIMPLE (BOTÓN MENÚ) --- */
        .top-nav {
            position: fixed; top: 0; left: 0; width: 100%; padding: 2rem 4vw;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; pointer-events: none;
        }
        
        .menu-trigger {
            pointer-events: auto; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); color: #fff;
            padding: 10px 20px; font-family: var(--font-tech); font-size: 1rem;
            cursor: pointer; display: flex; align-items: center; gap: 10px;
            backdrop-filter: blur(5px); border-radius: 4px; transition: all 0.3s;
        }
        .menu-trigger:hover { background: var(--brand-purple); border-color: var(--brand-purple); }

        /* =========================================================
           SISTEMA DE MENÚ LATERAL (COMPARTIDO CON INDEX)
           ========================================================= */
        .side-menu-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px); z-index: 9998; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .side-menu-overlay.active { opacity: 1; pointer-events: auto; }
        
        .side-menu { position: fixed; top: 0; left: -400px; width: 350px; max-width: 85vw; height: 100vh; background: rgba(17, 14, 23, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-right: 1px solid rgba(255, 255, 255, 0.1); z-index: 9999; display: flex; flex-direction: column; padding: 4rem 2rem; transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 20px 0 50px rgba(0,0,0,0.5); }
        .side-menu.active { left: 0; }

        .menu-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem; margin-bottom: 3rem; }
        .menu-title { font-family: var(--font-display); font-size: 1.5rem; color: #fff; letter-spacing: 1px; }
        .close-menu-btn { background: none; border: none; color: rgba(255,255,255,0.5); font-size: 1.2rem; cursor: pointer; font-family: var(--font-body); font-weight: bold; transition: color 0.3s; }
        .close-menu-btn:hover { color: var(--brand-purple); }

        .menu-links { display: flex; flex-direction: column; gap: 1.5rem; }
        .menu-link { color: #EAE9E4; text-decoration: none; font-size: 1.2rem; font-weight: 600; display: flex; align-items: center; gap: 15px; transition: all 0.3s ease; }
        .menu-link span.index { font-size: 0.8rem; color: var(--brand-purple); font-weight: bold; }
        .menu-link:hover { color: var(--brand-purple); padding-left: 10px; }
        .menu-footer { margin-top: auto; font-size: 0.75rem; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1px; }

        /* =========================================================
           SETUP DEL PROYECTO (EL FORMULARIO)
           ========================================================= */
        .setup-section {
            flex-grow: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 8rem 4vw 4rem 4vw; position: relative; z-index: 10;
        }

        .setup-container {
            width: 100%; max-width: 800px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 3rem; border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .setup-header { margin-bottom: 2.5rem; text-align: center; }
        .setup-header h1 { font-family: var(--font-display); font-size: clamp(2.5rem, 5vw, 4rem); color: var(--brand-purple); letter-spacing: 1px; text-transform: uppercase; line-height: 1; margin-bottom: 0.5rem; }
        .setup-header p { font-family: var(--font-tech); font-size: 0.95rem; color: rgba(255,255,255,0.5); }

        .form-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;
        }

        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group.full-width { grid-column: 1 / -1; }

        .form-label { font-family: var(--font-tech); font-size: 0.85rem; color: var(--brand-purple); text-transform: uppercase; letter-spacing: 1px; }
        
        .form-control {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff; padding: 1rem; font-family: var(--font-body); font-size: 1rem;
            border-radius: 4px; outline: none; transition: border-color 0.3s, background 0.3s;
            width: 100%; appearance: none;
        }
        
        .form-control:focus { border-color: var(--brand-purple); background: rgba(0, 0, 0, 0.4); }
        
        select.form-control {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236B00FF' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 1rem center; background-size: 1em;
            cursor: pointer;
        }
        select.form-control option { background: var(--dark-slate); color: #fff; }

        textarea.form-control { resize: vertical; min-height: 120px; }

        .btn-submit {
            grid-column: 1 / -1; background: var(--brand-purple); color: #fff;
            border: none; padding: 1.2rem; font-family: var(--font-tech); font-size: 1.1rem;
            font-weight: bold; text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; border-radius: 4px; margin-top: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(107, 0, 255, 0.2);
        }
        .btn-submit:hover {
            background: #5800d6; box-shadow: 0 0 25px rgba(107, 0, 255, 0.6);
            transform: translateY(-2px);
        }

        /* Pequeño footer */
        .system-footer {
            text-align: center; padding: 2rem; font-family: var(--font-tech);
            font-size: 0.8rem; color: rgba(255,255,255,0.3);
        }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; gap: 1.5rem; }
            .setup-container { padding: 2rem 1.5rem; }
            .top-nav { padding: 1.5rem 4vw; }
        }
    </style>
</head>
<body>

    <div class="noise-overlay"></div>

    <div class="top-nav">
        <button class="menu-trigger" id="openMenuBtn">
            <span style="font-size: 1.2rem;">&equiv;</span> SYSTEM.MENU
        </button>
    </div>

    <div class="side-menu-overlay" id="menuOverlay"></div>
    <nav class="side-menu" id="sideMenu">
        <div class="menu-header">
            <span class="menu-title">SYSTEM.MENU</span>
            <button class="close-menu-btn" id="closeMenuBtn">[ X ]</button>
        </div>
        <div class="menu-links">
            <a href="index.html#inicio" class="menu-link"><span class="index">[01]</span> INICIO</a>
            <a href="dex.html" class="menu-link" style="color: var(--brand-purple);"><span class="index">[02]</span> CREA TU PROYECTO</a>
            <a href="servicios.html" class="menu-link"><span class="index">[03]</span> MÓDULOS DE SISTEMA</a>
            <a href="historia.html" class="menu-link"><span class="index">[04]</span> SYSTEM LOG / HISTORIA</a>
        </div>
        <div class="menu-footer">
            DISK CREATIVO OS v1.0<br>Panamá, PT.
        </div>
    </nav>

    <section class="setup-section">
        <div class="setup-container">
            <div class="setup-header">
                <h1>Inicializar Proyecto</h1>
                <p>[ COMPLETE LOS PARÁMETROS PARA EJECUTAR LA CONEXIÓN ]</p>
            </div>

            <form id="projectForm" class="form-grid">
                
                <div class="form-group full-width">
                    <label class="form-label">Identificador (Nombre o Empresa)</label>
                    <input type="text" id="nombreCliente" class="form-control" placeholder="Ej. TechCorp PTY" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Tipo de Entidad</label>
                    <select id="tipoEntidad" class="form-control" required>
                        <option value="" disabled selected>Seleccione...</option>
                        <option value="Marca Personal">Marca Personal</option>
                        <option value="Startup / Nuevo Emprendimiento">Startup / Emprendimiento</option>
                        <option value="PYME">PYME</option>
                        <option value="Empresa Corporativa">Empresa Corporativa</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Módulo Requerido</label>
                    <select id="moduloServicio" class="form-control" required>
                        <option value="" disabled selected>Seleccione...</option>
                        <option value="Desarrollo Web / App">Desarrollo Web / Plataforma</option>
                        <option value="Identidad / Rebranding">Identidad Visual / Branding</option>
                        <option value="Producción de Contenido">Producción de Contenido</option>
                        <option value="Marketing / Pauta Digital">Pauta Digital & Estrategia</option>
                        <option value="Solución Integral (Varios)">Múltiples Módulos (Integral)</option>
                    </select>
                </div>

                <div class="form-group full-width">
                    <label class="form-label">Estimado de Inversión (Ayuda a ajustar la arquitectura)</label>
                    <select id="rangoInversion" class="form-control" required>
                        <option value="" disabled selected>Seleccione un rango estimado...</option>
                        <option value="Menos de $500 (MVP Básico)">Menos de $500 (MVP Básico)</option>
                        <option value="$500 - $1,500 (Desarrollo Estándar)">$500 - $1,500 (Desarrollo Estándar)</option>
                        <option value="$1,500 - $3,000 (Plataforma/Branding Pro)">$1,500 - $3,000 (Plataforma Pro)</option>
                        <option value="Más de $3,000 (Ecosistema Completo)">Más de $3,000 (Ecosistema Completo)</option>
                    </select>
                </div>

                <div class="form-group full-width">
                    <label class="form-label">Log de Detalles del Proyecto</label>
                    <textarea id="detallesProyecto" class="form-control" placeholder="Describe brevemente qué tienes en mente, objetivos, referentes o cualquier dato vital para inicializar el disco..." required></textarea>
                </div>

                <button type="submit" class="btn-submit">Ejecutar Comando >></button>
            </form>
        </div>
    </section>

    <div class="system-footer">
        [ END OF CONFIGURATION ] © 2026 DISK CREATIVO
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // --- LÓGICA DEL MENÚ LATERAL ---
            const openMenuBtn = document.getElementById('openMenuBtn');
            const closeMenuBtn = document.getElementById('closeMenuBtn');
            const sideMenu = document.getElementById('sideMenu');
            const menuOverlay = document.getElementById('menuOverlay');

            function toggleMenu() {
                sideMenu.classList.toggle('active');
                menuOverlay.classList.toggle('active');
            }

            openMenuBtn.addEventListener('click', toggleMenu);
            closeMenuBtn.addEventListener('click', toggleMenu);
            menuOverlay.addEventListener('click', toggleMenu);

            // --- LÓGICA DE ENVÍO A WHATSAPP ---
            const form = document.getElementById('projectForm');

            form.addEventListener('submit', function(e) {
                e.preventDefault(); // Evita que la página recargue

                // Recolectar datos
                const nombre = document.getElementById('nombreCliente').value;
                const entidad = document.getElementById('tipoEntidad').value;
                const modulo = document.getElementById('moduloServicio').value;
                const inversion = document.getElementById('rangoInversion').value;
                const detalles = document.getElementById('detallesProyecto').value;

                // Formatear el mensaje para WhatsApp
                const mensaje = `*[ SISTEMA DISK CREATIVO - INIT ]* 💽\n\nHola equipo, he inicializado un nuevo requerimiento en el sistema. Aquí están los parámetros:\n\n*Identificador:* ${nombre}\n*Entidad:* ${entidad}\n*Módulo Solicitado:* ${modulo}\n*Inversión:* ${inversion}\n\n*Log de Detalles:*\n"${detalles}"\n\n_Solicito conexión con un operador._`;

                // Codificar el texto para URL
                const textoCodificado = encodeURIComponent(mensaje);
                
                // Número de WhatsApp (Formato internacional de Panamá +507)
                const numeroWA = "50768529324";
                
                // Crear URL final y abrir en nueva pestaña
                const urlWhatsApp = `https://wa.me/${numeroWA}?text=${textoCodificado}`;
                window.open(urlWhatsApp, '_blank');
            });
        });
    </script>
</body>
</html>
